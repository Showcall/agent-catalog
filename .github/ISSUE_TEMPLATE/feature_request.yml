name: Feature request
description: Suggest a capability or improvement.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Check the [roadmap](../blob/main/docs/roadmap.md) and open issues first —
        your idea may already be planned or discussed.
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or gap, not just the proposed solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What you'd like to see. Sketches, config, or API shape welcome.
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - New runtime/framework support
        - Discovery (labels, heuristics, registries)
        - Card enrichment (A2A)
        - Gateway usage / traction
        - Frontend (fleet view, cards)
        - Scaffolder / golden path
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
