name: Release

# Publishes both @showcall/* packages to npm on a version tag, using npm
# Trusted Publishing (OIDC) — no long-lived NPM_TOKEN, automatic provenance.
#
# ONE-TIME SETUP (see docs/releasing.md):
#   1. npm org `showcall` exists.
#   2. Each package exists on npm — npm cannot configure a trusted publisher
#      for a package that does not exist yet, so the FIRST publish of each
#      package is a manual bootstrap (docs/releasing.md).
#   3. On npmjs.com, each package -> Settings -> Trusted Publishing: add this
#      repo (org `Showcall`, repo `agent-catalog`, workflow `release.yml`).
#
# After that, push a matching `vX.Y.Z` tag to publish both
# packages with no token. Publish uses the npm CLI, not yarn: yarn's publish
# does not perform the npm OIDC exchange.
#
# A second job then cuts the matching GitHub Release, with notes lifted from the
# CHANGELOG section for that version. Both jobs are idempotent (they skip work
# already done), so re-running a tag is safe.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for the npm OIDC trusted-publishing exchange

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Enable Corepack
        run: corepack enable

      # Node 24's bundled npm already satisfies trusted publishing (npm >=
      # 11.5.1, Node >= 22.14) and ships intact provenance deps. Do NOT force
      # `npm install -g npm@latest` on an older runtime: that left the global
      # npm missing `sigstore`, breaking `npm publish --provenance`.
      - uses: actions/setup-node@v5
        with:
          node-version: 24

      - name: Show tool versions
        run: node --version && npm --version

      - name: Install
        run: yarn install --immutable

      - name: Type check
        run: yarn tsc

      - name: Build packages
        run: yarn build

      # Publish with the npm CLI (not `yarn npm publish`) so the OIDC exchange
      # runs. No NODE_AUTH_TOKEN: npm uses the workflow's id-token. Provenance
      # is generated automatically; --provenance makes it explicit.
      # Each step skips a version that is already on npm, so re-runs and tags
      # for already-published versions do not hard-fail.
      - name: Publish backend module
        working-directory: plugins/plugin-agent-catalog-backend
        run: |
          name=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "$name@$ver" version >/dev/null 2>&1; then
            echo "::notice::$name@$ver already on npm — skipping publish."
          else
            npm publish --provenance --access public
          fi

      - name: Publish frontend plugin
        working-directory: plugins/plugin-agent-catalog
        run: |
          name=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "$name@$ver" version >/dev/null 2>&1; then
            echo "::notice::$name@$ver already on npm — skipping publish."
          else
            npm publish --provenance --access public
          fi

  # Cut the GitHub Release for the tag. Separate job so `publish` keeps its
  # minimal id-token-only scope; this one needs contents:write to create the
  # release. Only runs for tag pushes (not workflow_dispatch), and skips if the
  # release already exists so re-runs and manually-created releases don't fail.
  github-release:
    needs: publish
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "::notice::Release $TAG already exists — skipping."
            exit 0
          fi
          # Lift the notes from this version's CHANGELOG section (## [X.Y.Z] ...),
          # stopping at the next section header.
          ver="${TAG#v}"
          awk -v ver="$ver" '
            index($0, "## [" ver "]") == 1 { inblock = 1; next }
            inblock && /^## \[/ { exit }
            inblock { print }
          ' CHANGELOG.md > notes.md
          # Drop leading/trailing blank lines.
          sed -i -e '/./,$!d' notes.md
          if [ -s notes.md ]; then
            gh release create "$TAG" --title "$TAG" --notes-file notes.md
          else
            echo "::notice::No CHANGELOG section for $ver — using generated notes."
            gh release create "$TAG" --title "$TAG" --generate-notes
          fi
