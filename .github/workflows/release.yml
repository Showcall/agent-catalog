name: Release

# Publishes both @showcall/* packages to npm on a version tag, using npm
# Trusted Publishing (OIDC) — no long-lived NPM_TOKEN, automatic provenance.
#
# ONE-TIME SETUP (see docs/releasing.md):
#   1. npm org `showcall` exists.
#   2. Each package exists on npm — npm cannot configure a trusted publisher
#      for a package that does not exist yet, so the FIRST publish of each
#      package is a manual bootstrap (docs/releasing.md).
#   3. On npmjs.com, each package -> Settings -> Trusted Publishing: add this
#      repo (org `Showcall`, repo `agent-catalog`, workflow `release.yml`).
#
# After that, `git tag v0.1.0 && git push origin v0.1.0` publishes both
# packages with no token. Publish uses the npm CLI, not yarn: yarn's publish
# does not perform the npm OIDC exchange.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # required for the npm OIDC trusted-publishing exchange

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - uses: actions/setup-node@v4
        with:
          node-version: 22 # trusted publishing needs Node >= 22.14.0

      - name: Update npm (trusted publishing needs npm >= 11.5.1)
        run: npm install -g npm@latest

      - name: Install
        run: yarn install --immutable

      - name: Type check
        run: yarn tsc

      - name: Build packages
        run: yarn build

      # Publish with the npm CLI (not `yarn npm publish`) so the OIDC exchange
      # runs. No NODE_AUTH_TOKEN: npm uses the workflow's id-token. Provenance
      # is generated automatically; --provenance makes it explicit.
      # Each step skips a version that is already on npm, so re-runs and the
      # retroactive v0.1.0 tag (bootstrapped manually) don't hard-fail.
      - name: Publish backend module
        working-directory: plugins/catalog-backend-module-agent-catalog
        run: |
          name=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "$name@$ver" version >/dev/null 2>&1; then
            echo "::notice::$name@$ver already on npm — skipping publish."
          else
            npm publish --provenance --access public
          fi

      - name: Publish frontend plugin
        working-directory: plugins/plugin-agent-catalog
        run: |
          name=$(node -p "require('./package.json').name")
          ver=$(node -p "require('./package.json').version")
          if npm view "$name@$ver" version >/dev/null 2>&1; then
            echo "::notice::$name@$ver already on npm — skipping publish."
          else
            npm publish --provenance --access public
          fi
